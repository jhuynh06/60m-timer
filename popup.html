<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      width: 280px;
      padding: 16px;
      font-family: system-ui, sans-serif;
      text-align: center;
    }
    #status {
      margin-bottom: 8px;
      font-size: 14px;
      color: #555;
    }
    #role-badge {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 4px;
      min-height: 16px;
    }
    #role-badge.host { color: #1976d2; }
    #role-badge.guest { color: #388e3c; }
    #timer {
      font-size: 48px;
      font-weight: bold;
      font-variant-numeric: tabular-nums;
      margin: 12px 0;
    }
    button {
      padding: 8px 20px;
      font-size: 14px;
      cursor: pointer;
      border: 1px solid #ccc;
      border-radius: 4px;
      background: #fff;
      margin: 4px;
    }
    button:hover { background: #f0f0f0; }
    button:disabled { opacity: 0.35; cursor: default; }
    button:disabled:hover { background: #fff; }
    #startBtn { color: #2d8c2d; border-color: #2d8c2d; }
    #resetBtn { color: #b33; border-color: #b33; }
    .done #timer { color: #b33; }
    #lobby { margin-top: 12px; border-top: 1px solid #eee; padding-top: 12px; }
    #lobby button { font-size: 13px; padding: 6px 16px; }
    #join-section { margin-top: 8px; display: none; }
    #join-section input {
      padding: 6px 8px;
      font-size: 13px;
      width: 80px;
      text-transform: uppercase;
      text-align: center;
      letter-spacing: 2px;
      border: 1px solid #ccc;
      border-radius: 4px;
    }
    #room-info { display: none; margin-top: 12px; }
    #share-label {
      font-size: 11px;
      color: #999;
      margin-bottom: 6px;
      font-weight: 500;
    }
    #code-pill {
      display: flex;
      align-items: center;
      border: 1px solid #e0e0e0;
      border-radius: 9999px;
      overflow: hidden;
      margin-bottom: 8px;
    }
    #room-code {
      flex: 1;
      font-weight: 600;
      font-size: 15px;
      letter-spacing: 3px;
      color: #1a1a2e;
      padding: 8px 16px;
      text-align: center;
    }
    #copyBtn {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 8px 14px;
      border: none;
      border-left: 1px solid #e0e0e0;
      border-radius: 0;
      background: #e8f0fe;
      color: #1a73e8;
      cursor: pointer;
      margin: 0;
      transition: background 0.15s;
    }
    #copyBtn:hover { background: #d2e3fc; }
    #copyBtn.copied { background: #e6f4ea; color: #34a853; }
  </style>
</head>
<body>
  <div id="status">Looking for activity time...</div>
  <div id="role-badge"></div>
  <div id="timer">--:--:--</div>
  <div id="controls">
    <button id="startBtn" disabled>Start</button>
    <button id="resetBtn">Reset</button>
  </div>
  <div id="lobby">
    <button id="hostBtn">Host</button>
    <button id="joinToggleBtn">Join</button>
    <div id="join-section">
      <input id="codeInput" type="text" placeholder="CODE" maxlength="6" />
      <button id="joinBtn">Go</button>
    </div>
  </div>
  <div id="room-info">
    <div id="share-label">Share Timer</div>
    <div id="code-pill">
      <span id="room-code"></span>
      <button id="copyBtn" title="Copy code">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
      </button>
    </div>
    <button id="leaveBtn">Leave</button>
  </div>
  <script src="config.js"></script>
  <script src="supabase.js"></script>
  <script src="popup.js"></script>
</body>
</html>
